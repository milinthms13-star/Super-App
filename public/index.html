<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1834" />
    <meta
      name="description"
      content="NilaHub is a Kerala-first super app for shopping, messaging, listings, food, rides, safety, and community."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>NilaHub</title>
    
    <!-- Google Translate Meta -->
    <meta name="google-site-verification" content="YOUR_VERIFICATION_TOKEN" />
    
    <!-- Google Translate Widget CSS -->
    <link rel="stylesheet" href="https://translate.google.com/translate_a/element.css?cb=googleTranslateElementInit">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Google Translate Widget -->
    <div id="google_translate_element" style="position: fixed; top: 10px; right: 10px; z-index: 10000;"></div>
    
    <!-- Google Translate Script -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,ml,hi,ta,ar,te,kn,be,bn',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
          },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
  </body>
</html>

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/superapp-containers/superapp-api:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/superapp-containers/superapp-api:latest
      - ./backend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/superapp-containers/superapp-api:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/superapp-containers/superapp-api:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - superapp-api
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/superapp-containers/superapp-api:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=4Gi
      - --cpu=2
      - --concurrency=1
      - --timeout=900
      - --max-instances=2
      - --update-env-vars=VIDEO_STUDIO_REAL_CARTOON_MODE=1,VIDEO_STUDIO_ALLOW_AI_IN_FREE=1

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/superapp-containers/superapp-api:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/$PROJECT_ID/superapp-containers/superapp-api:latest

options:
  logging: CLOUD_LOGGING_ONLY
